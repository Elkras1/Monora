      const dayShifts=mine.filter(s=>s.date===iso).sort((a,b)=>a.start.localeCompare(b.start));
      return `<div style="margin-bottom:14px;">
        <div style="font-weight:700;font-family:'Space Grotesk';font-size:13px;margin-bottom:6px;color:${iso===todayIso?'var(--primary-dark)':'var(--ink)'};">${WEEKDAYS[(d.getDay()+6)%7]}, ${d.getDate()}.${d.getMonth()+1}.${iso===todayIso?' · Heute':''}</div>
        ${dayShifts.length? dayShifts.map(s=>meShiftRow(s)).join('') : `<div class="cal-empty-hint">Keine Schicht</div>`}
      </div>`;
    }).join('') : ''}
  ${tab==='open'? (openShifts.length? openShifts.map(s=>{
      const c=getCust(s.customerId);
      const accent = c? colorFor(c.id) : '#8A9A97';
      return `<div class="me-shift-row" style="background:var(--amber-tint);border-color:#F0DBA0;">
        <div style="width:4px;align-self:stretch;border-radius:3px;background:${accent};"></div>
        <div style="flex:1;">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span class="mono" style="font-weight:700;font-size:13.5px;">${fmtDate(new Date(s.date))} · ${s.start}–${s.end}</span>
            ${statusBadge('offen')}
          </div>
          <div class="hint" style="margin-top:3px;">${c?c.name:'—'}${s.pause?' · '+s.pause+' Min. Pause':''}</div>
          ${hasPerm('schedule_open_claim')? `<button class="btn btn-accent btn-sm" style="margin-top:8px;" onclick="claimOpenShift('${s.id}')">${ic('check')} Schicht übernehmen</button>` : `<div class="hint" style="margin-top:6px;">Übernahme durch dich ist nicht freigegeben.</div>`}
        </div>
      </div>`;
    }).join('') : `<div class="empty">${ic('schedule')}<p>Aktuell keine offenen Schichten.</p></div>`) : ''}
  ${state.panelShiftId? renderShiftPanel(): ''}`;
}
function claimOpenShift(id){
  const s=state.shifts.find(x=>x.id===id);
  if(!s || s.employeeId) return;
  s.employeeId=state.currentUserId;
  s.status='bestätigt';
  scheduleSave();
  render();
  toast('Schicht übernommen.');
}

/* ---- Zeiterfassung (Mitarbeiter) ---- */
function meTime(){
  const mine=[...state.timeEntries].filter(t=>t.employeeId===state.currentUserId).sort((a,b)=>new Date(b.clockIn)-new Date(a.clockIn));
  const canCorrection = hasPerm('time_correction_request');
  return `
  <div class="card" style="margin-bottom:16px;">${meStampBlock()}</div>
  <div class="grid cols-2" style="margin-bottom:16px;">
    <div class="card kpi"><div class="icon" style="background:var(--primary-tint);color:var(--primary-dark);">${ic('clock')}</div><div class="label">Heute</div><div class="value">${(myTodayMinutes()/60).toFixed(1)} h</div></div>
    <div class="card kpi"><div class="icon" style="background:var(--amber-tint);color:#93670A;">${ic('hourglass')}</div><div class="label">Diese Woche</div><div class="value">${(myWeekMinutes()/60).toFixed(1)} h</div></div>
  </div>
  <div class="card">
    <div class="card-head"><h3>Meine Zeiteinträge</h3><span class="hint">${mine.length} Einträge</span></div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${mine.length? mine.map(t=>{
        const c=getCust(t.customerId); const inD=new Date(t.clockIn), outD=t.clockOut?new Date(t.clockOut):null;
        const dur=outD?((outD-inD)/60000-(t.pauseMinutes||0)):null;
        return `<div style="border:1px solid var(--line);border-radius:10px;padding:10px 12px;">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-weight:700;font-size:12.8px;">${fmtDate(inD)}</span>
            ${statusBadge(t.status)}
          </div>
          <div class="hint" style="margin-top:5px;"><span class="mono">${fmtTime(inD)}–${outD?fmtTime(outD):'läuft…'}</span> · ${c?c.name:'—'}</div>
          <div class="hint">${t.pauseMinutes?t.pauseMinutes+' Min. Pause':'Keine Pause'}${dur!==null?' · '+Math.round(dur)+' Min. gesamt':''}</div>
          ${canCorrection? `<button class="link-btn" style="margin-top:6px;" onclick="openMeCorrection('${t.id}')">Korrektur beantragen</button>` : ''}
        </div>`;
      }).join('') : `<div class="empty">${ic('clock')}<p>Noch keine Zeiteinträge vorhanden.</p></div>`}
    </div>
  </div>`;
}
function openMeCorrection(entryId){
  state.editing={entryId, note:''};
  state.modal='meCorrection';
  render();
}
function submitMeCorrection(){
  const note=document.getElementById('mc-note').value.trim();
  if(!note){ toast('Bitte eine kurze Beschreibung angeben.'); return; }
  state.timeCorrections.push({id:uid(),employeeId:state.currentUserId,entryId:state.editing.entryId,note,status:'offen',date:isoDate(new Date())});
  scheduleSave();
  closeModal();
  toast('Korrekturanfrage gesendet.');
}
function modalMeCorrection(){
  return modalWrap('Korrektur beantragen', `
    <div class="field"><label>Was soll korrigiert werden?</label><textarea id="mc-note" rows="3" placeholder="z. B. Kommen war 08:00 statt 08:30…"></textarea></div>
    <div class="hint">Deine Anfrage wird an die Verwaltung gesendet und dort geprüft. Der Eintrag selbst bleibt bis dahin unverändert.</div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button><button class="btn btn-primary" onclick="submitMeCorrection()">${ic('check')} Anfrage senden</button>`);
}

/* ---- Abwesenheiten (Mitarbeiter) ---- */
function meAbsence(){
  const mine=state.absences.filter(a=>a.employeeId===state.currentUserId).sort((a,b)=>b.start.localeCompare(a.start));
  return `
  <div class="toolbar">
    <div class="sub" style="color:var(--ink-soft);font-size:12.5px;">${mine.length} Anträge</div>
    ${hasPerm('absence_request')?`<button class="btn btn-primary" onclick="openMeAbsenceModal()">${ic('plus')} Neuer Antrag</button>`:''}
  </div>
  <div style="display:flex;flex-direction:column;gap:10px;">
    ${mine.length? mine.map(a=>{
      const days=Math.round((new Date(a.end)-new Date(a.start))/86400000)+1;
      return `<div class="card" style="padding:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          ${absTypeBadge(a.type)}
          ${statusBadge(a.status)}
        </div>
        <div style="font-weight:700;font-size:13.5px;margin-top:8px;">${fmtDate(new Date(a.start))} – ${fmtDate(new Date(a.end))}</div>
        <div class="hint">${days} Tag${days>1?'e':''}${a.note?' · '+a.note:''}</div>
        ${a.status==='beantragt'? `<button class="link-btn" style="margin-top:8px;" onclick="cancelMyAbsence('${a.id}')">Antrag zurückziehen</button>` : ''}
      </div>`;
    }).join('') : `<div class="empty">${ic('absence')}<p>Noch keine Abwesenheiten beantragt.</p></div>`}
  </div>`;
}
function cancelMyAbsence(id){
  const a=state.absences.find(x=>x.id===id);
  if(!a || a.status!=='beantragt') return;
  state.absences=state.absences.filter(x=>x.id!==id);
  scheduleSave(); render();
  toast('Antrag zurückgezogen.');
}
function openMeAbsenceModal(){
  state.editing={type:'Urlaub',start:isoDate(new Date()),end:isoDate(new Date()),note:''};
  state.modal='meAbsence';
  render();
}
function saveMeAbsence(){
  const f=id=>document.getElementById(id).value;
  const data={employeeId:state.currentUserId,type:f('ma-type'),start:f('ma-start'),end:f('ma-end'),note:f('ma-note'),status:'beantragt'};
  state.absences.push({id:uid(),...data});
  scheduleSave();
  closeModal();
  toast('Antrag eingereicht.');
}
function modalMeAbsence(){
  const e=state.editing;
  return modalWrap('Abwesenheit beantragen', `
    <div class="field"><label>Art</label><select id="ma-type">
      <option ${e.type==='Urlaub'?'selected':''}>Urlaub</option>
      <option ${e.type==='Krankheit'?'selected':''}>Krankheit</option>
      <option ${e.type==='Unbezahlt'?'selected':''}>Unbezahlt</option>
      <option ${e.type==='Sonstiges'?'selected':''}>Sonstiges</option>
    </select></div>
    <div class="field-row">
      <div class="field"><label>Startdatum</label><input id="ma-start" type="date" value="${e.start}"></div>
      <div class="field"><label>Enddatum</label><input id="ma-end" type="date" value="${e.end}"></div>
    </div>
    <div class="field"><label>Kommentar (optional)</label><textarea id="ma-note" rows="2">${e.note||''}</textarea></div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button><button class="btn btn-primary" onclick="saveMeAbsence()">${ic('check')} Antrag senden</button>`);
}

/* ---- Profil (Mitarbeiter) ---- */
function meProfile(){
  const u=currentUser();
  const c=state.customers.filter(cc=>u.customerIds.includes(cc.id));
  return `
  <div class="card" style="text-align:center;padding:28px 20px;margin-bottom:16px;">
    <div class="avatar" style="background:${colorFor(u.id)};width:64px;height:64px;font-size:22px;margin:0 auto 12px;">${initials(u.name)}</div>
    <h2>${u.name}</h2>
    <div class="hint">${u.role}</div>
  </div>
  <div class="card" style="margin-bottom:16px;">
    <div class="card-head"><h3>Angaben</h3><button class="muted-link" onclick="openMeProfileModal()">${ic('edit')} Bearbeiten</button></div>
    <div class="detail-grid">
      <div><span class="dl">E-Mail</span><span class="dv">${u.email}</span></div>
      <div><span class="dl">Telefon</span><span class="dv">${u.phone}</span></div>
      <div><span class="dl">Standort(e)</span><span class="dv">${c.length? c.map(x=>x.name).join(', '):'—'}</span></div>
      <div><span class="dl">Rolle</span><span class="dv">${u.role}</span></div>
      <div><span class="dl">Wochenstunden (Soll)</span><span class="dv">${state.settings.weeklyHours} h</span></div>
    </div>
  </div>
  <div class="hint">Nur vom Administrator freigegebene Felder können hier bearbeitet werden.</div>`;
}
function openMeProfileModal(){
  state.editing={phone:currentUser().phone, email:currentUser().email};
  state.modal='meProfile';
  render();
}
function saveMeProfile(){
  const u=currentUser();
  const fields=state.settings.profileEditableFields;
  if(fields.phone) u.phone=document.getElementById('mp-phone').value;
  if(fields.email) u.email=document.getElementById('mp-email').value;
  scheduleSave();
  closeModal();
  toast('Profil aktualisiert.');
}
function modalMeProfile(){
  const e=state.editing, fields=state.settings.profileEditableFields;
  return modalWrap('Profil bearbeiten', `
    <div class="field"><label>Telefonnummer</label><input id="mp-phone" value="${e.phone}" ${fields.phone?'':'disabled'}></div>
    <div class="field"><label>E-Mail</label><input id="mp-email" value="${e.email}" ${fields.email?'':'disabled'}></div>
    ${(!fields.phone && !fields.email)? `<div class="hint">Dein Administrator hat aktuell keine Profilfelder zur Selbstbearbeitung freigegeben.</div>`:''}
  `, `<button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button><button class="btn btn-primary" onclick="saveMeProfile()">${ic('check')} Speichern</button>`);
}

/* ============ MODALS ============ */
function renderModal(){
  if(state.modal==='clockin') return modalClockIn();
  if(state.modal==='shift') return modalShift();
  if(state.modal==='employee') return modalEmployee();
  if(state.modal==='absence') return modalAbsence();
  if(state.modal==='customer') return modalCustomer();
  if(state.modal==='meAbsence') return modalMeAbsence();
  if(state.modal==='meCorrection') return modalMeCorrection();
  if(state.modal==='meProfile') return modalMeProfile();
  return '';
}
function modalWrap(title, bodyHtml, footHtml, wide, bodyId){
  return `<div class="overlay" onclick="if(event.target===this) closeModal();">
    <div class="modal ${wide?'modal-wide':''}">
      <div class="modal-head"><h3>${title}</h3><button class="close-x" onclick="closeModal()">${ic('close')}</button></div>
      <div class="modal-body" ${bodyId?`id="${bodyId}"`:''}>${bodyHtml}</div>
      ${footHtml?`<div class="modal-foot">${footHtml}</div>`:''}
    </div>
  </div>`;
}
function modalClockIn(){
  return modalWrap('Einstempeln', `<div id="clockinModalBody">${clockInModalContent()}</div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button><button class="btn btn-accent" onclick="confirmClockIn()">${ic('check')} Jetzt einstempeln</button>`);
}
function modalShift(){
  const e=state.editing;
  return modalWrap(e.id?'Schicht bearbeiten':'Neue Schicht', `
    <div class="field-row">
      <div class="field"><label>Datum</label><input id="sf-date" type="date" value="${e.date}"></div>
      <div class="field"><label>Standort / Kunde</label><select id="sf-cust">${state.customers.map(x=>`<option value="${x.id}" ${x.id===e.customerId?'selected':''}>${x.name}</option>`).join('')}</select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Startzeit</label><input id="sf-start" type="time" value="${e.start}"></div>
      <div class="field"><label>Endzeit</label><input id="sf-end" type="time" value="${e.end}"></div>
    </div>
    <div class="field" style="max-width:220px;"><label>Pause (Minuten)</label><input id="sf-pause" type="number" min="0" step="5" value="${e.pause||0}"></div>
    <div class="field">
      <label>Mitarbeiter</label>
      <select id="sf-emp" onchange="document.getElementById('sf-status').value=(this.value?'geplant':'offen');">
        <option value="">— Offen / noch nicht zugewiesen —</option>
        ${state.employees.filter(x=>x.status==='aktiv').map(x=>`<option value="${x.id}" ${x.id===e.employeeId?'selected':''}>${x.name} · ${x.role}</option>`).join('')}
      </select>
    </div>
    <div class="field"><label>Status</label><select id="sf-status">
      <option value="geplant" ${e.status==='geplant'?'selected':''}>Geplant</option>
      <option value="offen" ${e.status==='offen'?'selected':''}>Offen</option>
      <option value="bestätigt" ${e.status==='bestätigt'?'selected':''}>Bestätigt</option>
      <option value="konflikt" ${e.status==='konflikt'?'selected':''}>Konflikt</option>
    </select></div>
    <div class="field"><label>Notiz</label><textarea id="sf-notes" rows="2" placeholder="z. B. Besonderheiten, Vertretung, Event…">${e.notes||''}</textarea></div>
  `, `${e.id?`<button class="btn btn-danger" onclick="deleteShift('${e.id}')">${ic('trash')} Löschen</button>`:''}<button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button><button class="btn btn-primary" onclick="saveShift()">${ic('check')} Speichern</button>`);
}
function modalEmployee(){
  const e=state.editing;
  return modalWrap(e.id?'Mitarbeiter bearbeiten':'Mitarbeiter anlegen', `
    <div class="field"><label>Name</label><input id="ef-name" value="${e.name}" placeholder="Vor- und Nachname"></div>
    <div class="field-row">
      <div class="field"><label>Rolle</label><select id="ef-role">
        <option ${e.role==='Küchenchef'?'selected':''}>Küchenchef</option>
        <option ${e.role==='Koch'?'selected':''}>Koch</option>
        <option ${e.role==='Chef de Rang'?'selected':''}>Chef de Rang</option>
        <option ${e.role==='Servicefachkraft'?'selected':''}>Servicefachkraft</option>
        <option ${e.role==='Barkeeper'?'selected':''}>Barkeeper</option>
        <option ${e.role==='Empfangsmitarbeiterin'?'selected':''}>Empfangsmitarbeiterin</option>
        <option ${e.role==='Housekeeping'?'selected':''}>Housekeeping</option>
        <option ${e.role==='Teamleitung'?'selected':''}>Teamleitung</option>
        <option ${e.role==='Admin'?'selected':''}>Admin</option>
      </select></div>
      <div class="field"><label>Status</label><select id="ef-status">
        <option value="aktiv" ${e.status==='aktiv'?'selected':''}>Aktiv</option>
        <option value="inaktiv" ${e.status==='inaktiv'?'selected':''}>Inaktiv</option>
      </select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>E-Mail</label><input id="ef-email" value="${e.email}"></div>
      <div class="field"><label>Telefon</label><input id="ef-phone" value="${e.phone}"></div>
    </div>

    ${isAdmin()? `<div class="field"><label>Systemrolle</label><select id="ef-systemrole">
      <option value="mitarbeiter" ${e.systemRole==='mitarbeiter'?'selected':''}>Mitarbeiter</option>
      <option value="manager" ${e.systemRole==='manager'?'selected':''}>Manager</option>
      <option value="admin" ${e.systemRole==='admin'?'selected':''}>Administrator</option>
    </select><div class="hint">Bestimmt Navigation und Berechtigungen in der App. Nur für Administratoren sichtbar.</div></div>` : ''}
    <div class="field-row">
      <div class="field"><label>PIN (Zeiterfassung)</label><input id="ef-pin" value="${e.pin}"></div>
      <div class="field"><label>Eintrittsdatum</label><input id="ef-start" type="date" value="${e.startDate}"></div>
    </div>
    <div class="field">
      <label>Verknüpfte Standorte / Kunden</label>
      <div class="checks">
        ${state.customers.map(c=>`<label class="chip-check ${e.customerIds.includes(c.id)?'on':''}" onclick="toggleEditingCustomer('${c.id}')">${e.customerIds.includes(c.id)?ic('check'):''}${c.name}</label>`).join('')}
      </div>
      <div class="hint">Auswählen, um diesen Mitarbeiter mit Einsatzorten zu verknüpfen.</div>
    </div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button><button class="btn btn-primary" onclick="saveEmployee()">${ic('check')} ${e.id?'Speichern':'Anlegen'}</button>`);
}
function modalAbsence(){
  const e=state.editing;
  return modalWrap('Abwesenheit erfassen', `
    <div class="field"><label>Mitarbeiter</label><select id="af-emp">${state.employees.map(x=>`<option value="${x.id}" ${x.id===e.employeeId?'selected':''}>${x.name}</option>`).join('')}</select></div>
    <div class="field"><label>Art</label><select id="af-type">
      <option ${e.type==='Urlaub'?'selected':''}>Urlaub</option>
      <option ${e.type==='Krankheit'?'selected':''}>Krankheit</option>
      <option ${e.type==='Unbezahlt'?'selected':''}>Unbezahlt</option>
      <option ${e.type==='Sonstiges'?'selected':''}>Sonstiges</option>
    </select></div>
    <div class="field-row">
      <div class="field"><label>Von</label><input id="af-start" type="date" value="${e.start}"></div>
      <div class="field"><label>Bis</label><input id="af-end" type="date" value="${e.end}"></div>
    </div>
    <div class="field"><label>Notiz</label><textarea id="af-note" rows="2">${e.note||''}</textarea></div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button><button class="btn btn-primary" onclick="saveAbsence()">Antrag erfassen</button>`);
}
function modalCustomer(){
  const e=state.editing;
  return modalWrap(e.id?'Standort bearbeiten':'Standort / Kunde anlegen', `
    <div class="field"><label>Name</label><input id="cf-name" value="${e.name}" placeholder="z. B. Bürozentrum Nord"></div>
    <div id="addrSection">${addrSectionHtml()}</div>
    <div class="field"><label>Geofence-Radius (Meter)</label><input id="cf-radius" type="number" value="${e.radius}"></div>
    <div class="divider"></div>
    <div class="field-row">
      <div class="field"><label>Objekttyp</label><select id="cf-type">
        ${['Büro','Gastronomie','Praxis / Klinik','Hotel','Wohnobjekt','Lager / Küche','Industrie','Aussenanlage','Sonstiges'].map(t=>`<option ${e.type===t?'selected':''}>${t}</option>`).join('')}
      </select></div>
      <div class="field"><label>Fläche (m²)</label><input id="cf-area" type="number" value="${e.area||0}"></div>
    </div>
    <div class="field"><label>Reinigungsintervall</label><select id="cf-interval">
      ${['täglich','2x wöchentlich','wöchentlich','14-täglich','monatlich','nach Vereinbarung'].map(t=>`<option ${e.interval===t?'selected':''}>${t}</option>`).join('')}
    </select></div>
    <div class="divider"></div>
    <div class="field-row">
      <div class="field"><label>Ansprechperson</label><input id="cf-contact" value="${e.contact||''}"></div>
      <div class="field"><label>Telefon</label><input id="cf-phone" value="${e.phone||''}"></div>
    </div>
    <div class="divider"></div>
    <div class="field-row">
      <div class="field"><label>Vertragsbeginn</label><input id="cf-contractstart" type="date" value="${e.contractStart||''}"></div>
      <div class="field"><label>Stundenkontingent / Monat</label><input id="cf-hours" type="number" step="0.5" value="${e.monthlyHours||0}"></div>
    </div>
    <div class="field" style="max-width:220px;"><label>Stundensatz (CHF)</label><input id="cf-rate" type="number" step="0.5" value="${e.hourlyRate||0}"></div>
    <div class="divider"></div>
    <div class="field-row">
      <div class="field"><label>Schlüsselnummer</label><input id="cf-key" value="${e.keyNumber||''}"></div>
      <div class="field"><label>Zugangscode</label><input id="cf-code" value="${e.accessCode||''}"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Zugang von</label><input id="cf-from" type="time" value="${e.accessFrom||''}"></div>
      <div class="field"><label>Zugang bis</label><input id="cf-to" type="time" value="${e.accessTo||''}"></div>
    </div>
    <div class="field"><label>Zugangshinweis</label><textarea id="cf-accessnotes" rows="2" placeholder="z. B. Schlüssel bei Empfang, Alarmcode beachten…">${e.accessNotes||''}</textarea></div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button><button class="btn btn-primary" onclick="saveCustomer()">${ic('check')} ${e.id?'Speichern':'Anlegen'}</button>`, true);
}

/* ============ INIT ============ */
loadState();
</script>
</body>
</html>
