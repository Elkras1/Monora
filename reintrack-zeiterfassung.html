<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ReinTrack – Zeiterfassung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F7F6;
  --surface:#FFFFFF;
  --surface-alt:#EAF1EE;
  --ink:#0E241F;
  --ink-soft:#516663;
  --ink-faint:#8A9A97;
  --primary:#0E6E5B;
  --primary-dark:#0A5347;
  --primary-tint:#E3F3EE;
  --accent:#2FD98F;
  --accent-dark:#159C68;
  --amber:#DB9B0C;
  --amber-tint:#FBF0D9;
  --red:#D8464B;
  --red-tint:#FBE6E7;
  --line:#DCE6E3;
  --shadow: 0 1px 2px rgba(14,36,31,.04), 0 8px 24px -12px rgba(14,36,31,.12);
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  font-size:14px;
}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;margin:0;letter-spacing:-.01em;color:var(--ink);}
.mono{font-family:'IBM Plex Mono',monospace;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:14px;}
a{color:inherit;}
::selection{background:var(--accent);color:#04231a;}

/* ---------- App shell ---------- */
#app{display:flex;min-height:100vh;}

/* Sidebar */
.sidebar{
  width:238px;flex:none;background:var(--ink);
  background:linear-gradient(180deg,#0E241F 0%, #0A1D18 100%);
  color:#DCEAE5;display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;
}
.brand{display:flex;align-items:center;gap:10px;padding:20px 18px 16px;}
.brand-mark{width:34px;height:34px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex:none;}
.brand-mark svg{width:19px;height:19px;}
.brand-name{font-family:'Space Grotesk';font-weight:700;font-size:16.5px;color:#fff;line-height:1.1;}
.brand-sub{font-size:10.5px;color:#8FB3AA;letter-spacing:.06em;text-transform:uppercase;}
.nav{flex:1;padding:6px 12px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;
  color:#B9D3CC;font-size:13.6px;font-weight:500;background:transparent;border:none;text-align:left;width:100%;
  transition:background .12s, color .12s;
}
.nav-item svg{width:17px;height:17px;flex:none;opacity:.85;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active{background:var(--accent);color:#04231a;font-weight:600;}
.nav-item.active svg{opacity:1;}
.nav-foot{padding:14px 18px 18px;border-top:1px solid rgba(255,255,255,.08);}
.nav-foot .clock{font-family:'IBM Plex Mono';font-size:20px;font-weight:600;color:#fff;}
.nav-foot .date{font-size:11px;color:#8FB3AA;margin-top:2px;}

/* Main */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;border-bottom:1px solid var(--line);background:var(--surface);
  position:sticky;top:0;z-index:20;
}
.topbar h1{font-size:19px;}
.topbar .sub{color:var(--ink-soft);font-size:12.5px;margin-top:2px;}
.geo-pill{
  display:flex;align-items:center;gap:7px;background:var(--primary-tint);color:var(--primary-dark);
  padding:7px 12px;border-radius:999px;font-size:12.5px;font-weight:600;
}
.geo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent-dark);position:relative;flex:none;}
.geo-dot::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1.5px solid var(--accent-dark);animation:ping 1.8s ease-out infinite;}
@keyframes ping{0%{transform:scale(.6);opacity:.9}100%{transform:scale(2.1);opacity:0}}
.content{flex:1;padding:26px 28px 60px;max-width:1320px;width:100%;}

/* user chip / role switcher */
.user-chip{display:flex;align-items:center;gap:8px;background:var(--surface-alt);border:1px solid var(--line);border-radius:999px;padding:5px 12px 5px 5px;}
.user-chip-txt{text-align:left;line-height:1.2;}
.user-chip-txt .n{font-size:12.5px;font-weight:700;color:var(--ink);}
.user-chip-txt .r{font-size:10.5px;color:var(--ink-faint);font-weight:600;text-transform:uppercase;letter-spacing:.02em;}
.user-menu{position:absolute;top:calc(100% + 8px);right:0;width:270px;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:0 16px 40px rgba(0,0,0,.14);z-index:120;padding:12px;}
.user-menu-head{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-faint);font-weight:700;padding:2px 4px 8px;}
.user-menu-current{display:flex;align-items:center;gap:10px;padding:2px 4px;}
.user-menu-demo-label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;padding:2px 4px 6px;}
.user-menu-demo-label svg{width:12px;height:12px;color:var(--amber);}
.user-menu-item{display:flex;align-items:center;gap:9px;width:100%;padding:8px;border-radius:9px;border:none;background:transparent;text-align:left;}
.user-menu-item:hover{background:var(--surface-alt);}
.user-menu-item.active{background:var(--primary-tint);}

/* login screen */
.login-screen{min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
.login-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:32px 28px;}
.login-brand{display:flex;align-items:center;gap:10px;}
.login-error{color:var(--red);font-size:12.5px;font-weight:600;min-height:16px;margin:-4px 0 10px;}
.login-demo-divider{display:flex;align-items:center;gap:10px;margin:22px 0 12px;color:var(--ink-faint);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
.login-demo-divider::before,.login-demo-divider::after{content:'';flex:1;height:1px;background:var(--line);}
.login-demo-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:var(--surface);text-align:left;}
.login-demo-item:hover{border-color:var(--primary);background:var(--surface-alt);}

/* mobile tab bar (Mitarbeiter-Ansicht) */
.mobile-tabbar{display:none;}
@media (max-width:880px){
  .mobile-tabbar{
    display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);
    border-top:1px solid var(--line);box-shadow:0 -6px 20px rgba(0,0,0,.06);z-index:60;padding:4px 2px calc(4px + env(safe-area-inset-bottom));
  }
  .mtab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;border:none;background:none;color:var(--ink-faint);font-size:10px;font-weight:700;}
  .mtab svg{width:19px;height:19px;}
  .mtab.active{color:var(--primary);}
  .content{padding-bottom:82px;}
}

/* Cards / grid */
.grid{display:grid;gap:16px;}
.cols-4{grid-template-columns:repeat(4,1fr);}
.cols-3{grid-template-columns:repeat(3,1fr);}
.cols-2{grid-template-columns:2fr 1fr;}
@media (max-width:1000px){.cols-4{grid-template-columns:repeat(2,1fr);}.cols-2,.cols-3{grid-template-columns:1fr;}}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 18px;box-shadow:var(--shadow);}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-head h3{font-size:14.5px;}
.card-head .muted-link{font-size:12px;color:var(--primary);font-weight:600;background:none;border:none;}

.kpi .label{font-size:12px;color:var(--ink-soft);font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
.kpi .value{font-family:'Space Grotesk';font-size:30px;font-weight:700;margin-top:6px;}
.kpi .delta{font-size:12px;margin-top:4px;color:var(--ink-faint);}
.kpi .icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.kpi .icon svg{width:17px;height:17px;}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:9px;border:1px solid transparent;font-size:13.3px;font-weight:600;transition:transform .06s, background .12s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-accent{background:var(--accent);color:#04231a;}
.btn-accent:hover{background:var(--accent-dark);color:#fff;}
.btn-ghost{background:var(--surface-alt);color:var(--ink);}
.btn-ghost:hover{background:var(--line);}
.btn-outline{background:transparent;border-color:var(--line);color:var(--ink);}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);}
.btn-danger{background:var(--red-tint);color:var(--red);}
.btn-danger:hover{background:var(--red);color:#fff;}
.btn-sm{padding:6px 11px;font-size:12.2px;border-radius:8px;}
.btn svg{width:14px;height:14px;}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--surface);display:flex;align-items:center;justify-content:center;}
.icon-btn:hover{border-color:var(--primary);color:var(--primary);}
.icon-btn svg{width:15px;height:15px;}

/* badges */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3.5px 9px;border-radius:999px;font-size:11.3px;font-weight:700;letter-spacing:.01em;}
.badge-green{background:var(--primary-tint);color:var(--primary-dark);}
.badge-mint{background:#E3FBEF;color:var(--accent-dark);}
.badge-amber{background:var(--amber-tint);color:#93670A;}
.badge-red{background:var(--red-tint);color:var(--red);}
.badge-blue{background:#E3EDF7;color:#2A6FA8;}
.badge-grey{background:var(--surface-alt);color:var(--ink-soft);}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

/* table */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13.2px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-faint);font-weight:700;padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap;}
td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--surface-alt);}
.avatar{width:29px;height:29px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;font-family:'Space Grotesk';flex:none;}
.person{display:flex;align-items:center;gap:9px;}
.person .name{font-weight:600;}
.person .meta{color:var(--ink-faint);font-size:11.5px;}

/* forms */
.field{margin-bottom:13px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--surface);color:var(--ink);
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-tint);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.checks{display:flex;flex-wrap:wrap;gap:8px;}
.chip-check{display:flex;align-items:center;gap:6px;background:var(--surface-alt);padding:6px 10px;border-radius:8px;font-size:12.5px;border:1px solid transparent;}
.chip-check.on{background:var(--primary-tint);border-color:var(--primary);color:var(--primary-dark);font-weight:600;}
.hint{font-size:11.5px;color:var(--ink-faint);margin-top:4px;}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(10,25,20,.45);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-wide{max-width:640px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line);}
.modal-head h3{font-size:16px;}
.modal-body{padding:20px;}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:16px 20px;border-top:1px solid var(--line);}
.close-x{width:28px;height:28px;border-radius:8px;border:none;background:var(--surface-alt);display:flex;align-items:center;justify-content:center;}
.close-x svg{width:14px;height:14px;}

/* empty state */
.empty{text-align:center;padding:36px 20px;color:var(--ink-faint);}
.empty svg{width:34px;height:34px;margin-bottom:10px;opacity:.5;}
.empty p{font-size:13px;}

/* tabs / pills row */
.tabs{display:flex;gap:6px;background:var(--surface-alt);padding:4px;border-radius:10px;width:fit-content;}
.tab{padding:7px 13px;border:none;background:transparent;border-radius:8px;font-size:12.6px;font-weight:600;color:var(--ink-soft);}
.tab.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow);}

.toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
.search{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:7px 11px;min-width:220px;}
.search svg{width:14px;height:14px;color:var(--ink-faint);flex:none;}
.search input{border:none;outline:none;flex:1;background:transparent;}

/* ---- Signature widget: geofence clock ---- */
.stamp-widget{display:flex;align-items:center;gap:26px;flex-wrap:wrap;}
.dial-wrap{position:relative;width:150px;height:150px;flex:none;}
.dial-ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--line);}
.dial-pulse{position:absolute;inset:0;border-radius:50%;border:2px solid var(--accent);opacity:0;animation:dialpulse 2.4s ease-out infinite;}
.dial-pulse.d2{animation-delay:.8s;}
.dial-pulse.d3{animation-delay:1.6s;}
@keyframes dialpulse{0%{transform:scale(.72);opacity:.55;}100%{transform:scale(1.28);opacity:0;}}
.dial-core{position:absolute;inset:14px;border-radius:50%;background:var(--ink);background:linear-gradient(160deg,#0E241F,#0A3229);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;}
.dial-core.off{background:linear-gradient(160deg,#4B615C,#37473F);}
.dial-core .time{font-family:'IBM Plex Mono';font-size:20px;font-weight:600;}
.dial-core .lbl{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-top:3px;font-weight:700;}
.dial-core.off .lbl{color:#B9C7C2;}
.stamp-info{flex:1;min-width:220px;}
.stamp-info .who{font-size:13px;color:var(--ink-soft);margin-bottom:2px;}
.stamp-info h2{font-size:20px;margin-bottom:8px;}
.stamp-meta{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;}
.stamp-meta div{font-size:12px;color:var(--ink-faint);}
.stamp-meta b{display:block;color:var(--ink);font-size:14px;font-family:'Space Grotesk';}

/* calendar */
.week-nav{display:flex;align-items:center;gap:10px;}
.sched-week-input{padding:7px 9px;border:1px solid var(--line);border-radius:9px;background:var(--surface);color:var(--ink-soft);font-size:12.5px;}
.toolbar select{padding:7px 10px;border:1px solid var(--line);border-radius:9px;background:var(--surface);font-size:12.5px;color:var(--ink);}

/* desktop week board: 7 day columns */
.sched-desktop{display:block;}
.sched-mobile{display:none;}
.cal-grid7{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;align-items:start;}
.cal-col{background:var(--surface);border:1px solid var(--line);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;min-height:200px;}
.cal-col.is-today{border-color:var(--accent-dark);box-shadow:0 0 0 1px var(--accent-dark);}
.cal-col-head{background:var(--surface-alt);padding:9px 10px;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-soft);display:flex;align-items:center;gap:6px;}
.cal-col-head .d{font-family:'Space Grotesk';font-size:14px;color:var(--ink);margin-left:2px;}
.cal-col.is-today .cal-col-head{color:var(--accent-dark);}
.today-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-dark);margin-left:auto;}
.cal-col-body{padding:9px;display:flex;flex-direction:column;gap:8px;flex:1;min-height:80px;}
.cal-empty-hint{color:var(--ink-faint);font-size:11.5px;text-align:center;padding:14px 4px;border:1px dashed var(--line);border-radius:9px;}
.cal-add-day{border:none;border-top:1px solid var(--line);background:var(--surface);color:var(--ink-faint);font-size:12px;font-weight:600;padding:9px;display:flex;align-items:center;justify-content:center;gap:5px;}
.cal-add-day:hover{background:var(--surface-alt);color:var(--primary);}
.cal-add-day svg{width:12px;height:12px;}

/* shift card */
.shift-card{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--ink-faint);border-radius:9px;padding:8px 9px;cursor:pointer;transition:transform .08s, box-shadow .12s;}
.shift-card:hover{transform:translateY(-1px);box-shadow:var(--shadow);}
.shift-card-top{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:5px;}
.shift-time{font-size:12px;font-weight:700;}
.shift-card-who{display:flex;align-items:center;gap:7px;font-size:12.3px;font-weight:600;margin-bottom:4px;}
.shift-card-meta{font-size:11px;color:var(--ink-faint);display:flex;gap:4px;flex-wrap:wrap;}
.open-flag{color:#93670A;font-weight:700;font-size:11.6px;display:inline-flex;align-items:center;gap:5px;}
.shift-card.is-open{background:var(--amber-tint);border-left-color:var(--amber);}
.shift-card.is-conflict{background:var(--red-tint);border-left-color:var(--red);}
.shift-card.is-conflict .shift-time{color:var(--red);}

/* shift detail drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(10,25,20,.4);backdrop-filter:blur(1px);z-index:110;display:flex;justify-content:flex-end;}
.drawer{width:100%;max-width:420px;height:100vh;background:var(--surface);box-shadow:-16px 0 40px rgba(0,0,0,.18);display:flex;flex-direction:column;animation:drawerin .18s ease-out;}
@keyframes drawerin{from{transform:translateX(24px);opacity:.4;}to{transform:translateX(0);opacity:1;}}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line);}
.drawer-body{padding:20px;overflow-y:auto;flex:1;}
.drawer-foot{display:flex;gap:8px;padding:16px 20px;border-top:1px solid var(--line);flex-wrap:wrap;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px;}
.detail-grid .dl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-faint);margin-bottom:4px;}
.detail-grid .dv{font-size:13.5px;font-weight:600;color:var(--ink);}

/* mobile schedule */
.day-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;}
.day-tab{flex:none;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:8px 13px;font-size:12px;font-weight:700;color:var(--ink-soft);display:flex;flex-direction:column;align-items:center;gap:2px;}
.day-tab span{font-size:11px;font-weight:500;color:var(--ink-faint);}
.day-tab.active{background:var(--primary);border-color:var(--primary);color:#fff;}
.day-tab.active span{color:rgba(255,255,255,.75);}
.mob-day-list{display:flex;flex-direction:column;gap:9px;}
.fab{position:fixed;bottom:22px;right:18px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#04231a;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 24px rgba(14,110,91,.35);z-index:40;}
.fab svg{width:22px;height:22px;}

@media (max-width:880px){
  .sched-desktop{display:none;}
  .sched-mobile{display:block;}
}

/* customer cards */
.cust-card{border:1px solid var(--line);border-radius:12px;padding:15px;background:var(--surface);}
.cust-card .top{display:flex;justify-content:space-between;align-items:flex-start;}
.cust-card h4{font-size:14.5px;}
.cust-card .addr{font-size:12.3px;color:var(--ink-soft);margin-top:3px;}
.radius-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--primary-dark);background:var(--primary-tint);padding:3px 8px;border-radius:999px;margin-top:9px;font-weight:700;}
.cust-card{cursor:pointer;transition:transform .08s, box-shadow .12s;}
.cust-card:hover{transform:translateY(-1px);box-shadow:var(--shadow);}
.addr-suggest{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);z-index:30;margin-top:4px;overflow:hidden;max-height:220px;overflow-y:auto;}
.addr-suggest-item{display:flex;align-items:center;gap:8px;padding:9px 11px;font-size:12.6px;cursor:pointer;border-bottom:1px solid var(--line);}
.addr-suggest-item:last-child{border-bottom:none;}
.addr-suggest-item:hover{background:var(--surface-alt);}
.addr-suggest-item svg{width:14px;height:14px;color:var(--ink-faint);flex:none;}

/* misc */
.divider{height:1px;background:var(--line);margin:16px 0;}
.link-btn{background:none;border:none;color:var(--primary);font-weight:600;font-size:12.8px;}
.slider{width:100%;}
.sim-box{background:var(--amber-tint);border:1px solid #F0DBA0;border-radius:10px;padding:12px 14px;font-size:12.5px;color:#7A5B08;}
.ok-box{background:#E3FBEF;border:1px solid #B7EFD3;border-radius:10px;padding:12px 14px;font-size:12.8px;color:var(--accent-dark);}
.warn-box{background:var(--red-tint);border:1px solid #F3C4C6;border-radius:10px;padding:12px 14px;font-size:12.8px;color:var(--red);}
.settings-section{margin-bottom:26px;}
.settings-section h3{font-size:14px;margin-bottom:3px;}
.settings-section .desc{font-size:12.3px;color:var(--ink-soft);margin-bottom:14px;}

/* permission toggles */
.perm-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 2px;border-bottom:1px solid var(--line);font-size:12.8px;cursor:pointer;}
.perm-row:last-child{border-bottom:none;}
.toggle{width:38px;height:22px;border-radius:999px;background:var(--surface-alt);border:1px solid var(--line);position:relative;flex:none;transition:background .15s;}
.toggle.on{background:var(--accent);border-color:var(--accent-dark);}
.toggle-knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:left .15s;}
.toggle.on .toggle-knob{left:18px;}

/* Mitarbeiter-Ansicht */
.me-greet{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.me-greet h2{font-size:21px;margin-top:2px;}
.me-shift-row{display:flex;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer;background:var(--surface);}
.me-shift-row:last-child{margin-bottom:0;}
.me-shift-row:hover{box-shadow:var(--shadow);}

.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--shadow);z-index:200;display:flex;align-items:center;gap:8px;}
.toast svg{width:15px;height:15px;color:var(--accent);}

.mobile-toggle{display:none;}
@media (max-width:880px){

  .mobile-toggle{display:flex;}

function timeOverlap(a,b){ return a.start < b.end && b.start < a.end; }
function computeConflictIds(){
  const map={};
  state.shifts.forEach(s=>{ if(!s.employeeId) return; const key=s.employeeId+'|'+s.date; (map[key]=map[key]||[]).push(s); });
  const ids=new Set();
  Object.values(map).forEach(arr=>{
    for(let i=0;i<arr.length;i++){
      for(let j=i+1;j<arr.length;j++){
        if(timeOverlap(arr[i],arr[j])){ ids.add(arr[i].id); ids.add(arr[j].id); }
      }
    }
  });
  return ids;
}
function shiftDisplayStatus(shift, conflictIds){
  return conflictIds.has(shift.id) ? 'konflikt' : shift.status;
}

function pad(n){return n.toString().padStart(2,'0');}
function fmtTime(d){return pad(d.getHours())+':'+pad(d.getMinutes());}
function fmtDate(d){return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear();}
function isoDate(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function mondayOf(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x;}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
const WEEKDAYS=['Mo','Di','Mi','Do','Fr','Sa','So'];
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000,toRad=x=>x*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function currentUser(){ return getEmp(state.currentUserId) || state.employees.find(e=>e.systemRole==='admin'); }
function currentRole(){ const u=currentUser(); return u? u.systemRole: 'admin'; }
function isAdmin(){ return currentRole()==='admin'; }
function hasPerm(permId){
  const role=currentRole();
  if(role==='admin') return true;
  return !!(state.permissions[role] && state.permissions[role][permId]);
}

/* ---- Login / Logout (Prototyp-Simulation, echte Auth folgt später) ---- */
function attemptLogin(){
  const empId = document.getElementById('login-user').value;
  const pin = document.getElementById('login-pin').value.trim();
  const errBox = document.getElementById('login-error');
  const emp = getEmp(empId);
  if(!emp || emp.status!=='aktiv'){ if(errBox) errBox.textContent='Bitte ein gültiges Konto auswählen.'; return; }
  if(!pin || pin !== emp.pin){ if(errBox) errBox.textContent='PIN ist nicht korrekt. Bitte erneut versuchen.'; return; }
  completeLogin(emp.id);
}
function quickDemoLogin(id){
  completeLogin(id);
}
function completeLogin(empId){
  const emp=getEmp(empId);
  if(!emp) return;
  state.currentUserId = emp.id;
  state.loggedIn = true;
  // Rolle wird automatisch aus dem Benutzerkonto übernommen – nicht wählbar.
  state.view = emp.systemRole==='mitarbeiter' ? 'me-start' : 'dashboard';
  state.sidebarOpen=false;
  state.userMenuOpen=false;
  state.loginError='';
  state.modal=null; state.editing=null;
  state.panelShiftId=null; state.panelLocationId=null; state.panelTimeEntryId=null;
  scheduleSave();
  render();
  toast('Angemeldet als '+emp.name);
}
function logout(){
  state.loggedIn=false;
  state.userMenuOpen=false;
  state.modal=null; state.editing=null;
  state.panelShiftId=null; state.panelLocationId=null; state.panelTimeEntryId=null;
  scheduleSave();
  render();
}

let state = null;
let saveTimer=null;
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async ()=>{
    try{
      const persistable = {employees:state.employees,customers:state.customers,shifts:state.shifts,absences:state.absences,timeEntries:state.timeEntries,timeCorrections:state.timeCorrections,settings:state.settings,permissions:state.permissions,currentUserId:state.currentUserId,loggedIn:state.loggedIn};
      await window.storage.set('reintrack-data', JSON.stringify(persistable), false);
    }catch(e){ console.error('Speichern fehlgeschlagen', e); }
  },350);

async function loadState(){
  let data=null;
  try{
    const res = await window.storage.get('reintrack-data', false);
    if(res && res.value) data = JSON.parse(res.value);
  }catch(e){ data=null; }
  if(!data){ data = seedData(); }
  data = migrateData(data);
  state = Object.assign({
    view:'dashboard', weekOffset:0, currentEmployeeId: data.employees[0]?.id||null,
    modal:null, editing:null, geoSim:{active:false,distance:20,customerId:null}, filter:{}, sidebarOpen:false,
    panelShiftId:null, panelLocationId:null, panelTimeEntryId:null, mobileDay:isoDate(new Date()), addrQuery:'', addrResults:[],
    currentUserId: data.currentUserId || (data.employees.find(e=>e.systemRole==='admin')||data.employees[0])?.id,
    loggedIn:false, loginError:''
  }, data);
  render();
  scheduleSave();
}
function migrateData(data){
  if(!data.permissions) data.permissions = JSON.parse(JSON.stringify(DEFAULT_PERMISSIONS));
  if(!data.timeCorrections) data.timeCorrections = [];
  if(!data.settings.profileEditableFields) data.settings.profileEditableFields = {...DEFAULT_PROFILE_EDITABLE};
  let hasAdmin=false, hasManager=false;
  data.employees.forEach(e=>{
    if(!e.systemRole) e.systemRole='mitarbeiter';
    if(e.systemRole==='admin') hasAdmin=true;
    if(e.systemRole==='manager') hasManager=true;
    delete e.teamId; // Teams-Feature wurde entfernt
  });
  if(!hasAdmin){
    let laura=data.employees.find(e=>e.name==='Laura Keller');
    if(laura) laura.systemRole='admin';
    else data.employees.push({id:uid(),name:'Laura Keller',role:'Administrator',systemRole:'admin',email:'laura.keller@alpen-gastro.demo',phone:'+41 79 000 00 01',status:'aktiv',pin:'0001',startDate:'2023-03-01',customerIds:[]});
  }
  if(!hasManager){
    let marco=data.employees.find(e=>e.name==='Marco Baumann');
    if(marco) marco.systemRole='manager';
    else data.employees.push({id:uid(),name:'Marco Baumann',role:'Manager Service',systemRole:'manager',email:'marco.baumann@alpen-gastro.demo',phone:'+41 79 000 00 02',status:'aktiv',pin:'0002',startDate:'2023-03-01',customerIds:data.customers.slice(0,2).map(c=>c.id)});
  }
  data.shifts.forEach(s=>{ delete s.teamId; });
  data.timeEntries.forEach(t=>{
    if(t.pauseMinutes===undefined) t.pauseMinutes=0;
    if(t.pauseStart===undefined) t.pauseStart=null;
    if(!t.status) t.status='offen';
    if(!t.createdAt) t.createdAt=t.clockIn;
    if(!t.updatedAt) t.updatedAt=t.clockOut||t.createdAt;
    if(t.notes===undefined) t.notes='';
    if(!t.changeLog) t.changeLog=[];
  });
  data.absences.forEach(a=>{ if(a.type==='Ferien') a.type='Urlaub'; });
  data.customers.forEach(c=>{ if(!c.tasks) c.tasks=[]; if(!c.issues) c.issues=[]; });
  ['manager','mitarbeiter'].forEach(r=>{
    if(data.permissions[r]){ delete data.permissions[r].teams_view; delete data.permissions[r].teams_manage; }
  });
  delete data.teams;
  return data;
}

function tickClock(){
  const upd=()=>{
    const now=new Date();
    const c=document.getElementById('sidebarClock'); if(c) c.textContent=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
    const d=document.getElementById('sidebarDate'); if(d) d.textContent=now.toLocaleDateString('de-CH',{weekday:'long',day:'2-digit',month:'long'});
    const dw=document.getElementById('dialTime'); if(dw) dw.textContent=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
    const mw=document.getElementById('meDialTime'); if(mw) mw.textContent=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  };
  upd();
  if(window.__clockInterval) clearInterval(window.__clockInterval);
  window.__clockInterval=setInterval(upd,1000);
}

/* ============ ZEITERFASSUNG VIEW (Admin/Manager) ============ */
function filteredTimeEntries(){
  const f=state.filter;
  const canAll = hasPerm('time_view_all');
  let entries=[...state.timeEntries];
  if(!canAll) entries = entries.filter(t=>t.employeeId===state.currentUserId);
  if(f.teEmp && f.teEmp!=='alle') entries = entries.filter(t=>t.employeeId===f.teEmp);
  if(f.teCust && f.teCust!=='alle') entries = entries.filter(t=>t.customerId===f.teCust);
  if(f.teStatus && f.teStatus!=='alle') entries = entries.filter(t=>t.status===f.teStatus);
  if(f.tePeriod && f.tePeriod!=='alle'){
    const now=new Date();
    let start;
    if(f.tePeriod==='heute') start=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    else if(f.tePeriod==='woche') start=mondayOf(now);
    else if(f.tePeriod==='monat') start=new Date(now.getFullYear(),now.getMonth(),1);
    entries = entries.filter(t=>new Date(t.clockIn)>=start);
  }
  return entries.sort((a,b)=>new Date(b.clockIn)-new Date(a.clockIn));
}

function resolveCorrection(id,status){
  const c=state.timeCorrections.find(x=>x.id===id);
  if(c){ c.status=status; scheduleSave(); render(); toast('Korrekturanfrage aktualisiert.'); }
}
function quickSetStatus(entryId,newStatus){
  const t=state.timeEntries.find(x=>x.id===entryId);
  if(!t || !hasPerm('time_confirm')) return;
  logTimeEntryChange(t, `Status wurde von "${statusLabel(t.status)}" auf "${statusLabel(newStatus)}" gesetzt.`);
  t.status=newStatus;
  t.updatedAt=new Date().toISOString();
  scheduleSave();
  render();
  toast('Status aktualisiert.');
}
function statusLabel(s){ return {offen:'Offen',bestätigt:'Bestätigt',korrigiert:'Korrigiert'}[s]||s; }
function logTimeEntryChange(t, text){

  t.changeLog.push({ts:new Date().toISOString(), text, by: currentUser()?.name||'System'});

function saveTimeEntryDetail(){
  const t=state.timeEntries.find(x=>x.id===state.panelTimeEntryId);
  if(!t) return;
  const startV=document.getElementById('te-start').value;
  const endV=document.getElementById('te-end').value;
  const pauseV=parseInt(document.getElementById('te-pause').value)||0;
  const notesV=document.getElementById('te-notes').value;
  const statusV=document.getElementById('te-status').value;
  const day=isoDate(new Date(t.clockIn));
  const oldStartLabel=fmtTime(new Date(t.clockIn));
  const oldEndLabel=t.clockOut?fmtTime(new Date(t.clockOut)):'—';
  const oldPause=t.pauseMinutes||0;
  const oldStatus=t.status;
  const oldNotes=t.notes||'';

  if(startV){
    const newClockIn=new Date(day+'T'+startV+':00').toISOString();
    const newLabel=startV;
    if(newLabel!==oldStartLabel) logTimeEntryChange(t, `Startzeit wurde von ${oldStartLabel} auf ${newLabel} geändert.`);
    t.clockIn=newClockIn;
  }
  if(endV){
    const newClockOut=new Date(day+'T'+endV+':00').toISOString();
    if(endV!==oldEndLabel) logTimeEntryChange(t, `Endzeit wurde von ${oldEndLabel} auf ${endV} geändert.`);
    t.clockOut=newClockOut;
  }
  if(pauseV!==oldPause) logTimeEntryChange(t, `Pause wurde von ${oldPause} Min. auf ${pauseV} Min. geändert.`);
  t.pauseMinutes=pauseV;
  if(notesV!==oldNotes) logTimeEntryChange(t, notesV? `Notiz ergänzt: "${notesV}"` : 'Notiz entfernt.');
  t.notes=notesV;
  if(statusV!==oldStatus) logTimeEntryChange(t, `Status wurde von "${statusLabel(oldStatus)}" auf "${statusLabel(statusV)}" gesetzt.`);
  t.status=statusV;
  t.updatedAt=new Date().toISOString();

  scheduleSave();
  renderTimeEntryPanelBody();
  render();
  toast('Zeiteintrag aktualisiert.');
}

function actingEmployeeId(){ return currentRole()==='mitarbeiter'? state.currentUserId : state.currentEmployeeId; }
function openClockInFlow(){
  const emp=getEmp(actingEmployeeId());
  if(!emp){ toast('Bitte zuerst einen Mitarbeiter auswählen.'); return; }
  const assigned = state.customers.filter(c=>emp.customerIds.includes(c.id) && c.active);
  const pool = assigned.length? assigned : state.customers.filter(c=>c.active);
  state.geoSim = {active:false, distance:20, customerId: pool[0]?.id||null, checked:false, result:null, pool};
  state.modal='clockin';
  render();
  tryGeolocate();
}
function tryGeolocate(){
  const box=document.getElementById('geoResultBox');
  if(!navigator.geolocation){ state.geoSim.active=true; if(box) renderClockInModalBody(); return; }
  if(box) box.innerHTML = `<div class="hint">Standort wird ermittelt…</div>`;
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const {latitude,longitude}=pos.coords;
      let best=null;
      state.geoSim.pool.forEach(c=>{
        const d=haversine(latitude,longitude,c.lat,c.lng);
        if(!best||d<best.d) best={c,d};
      });
      state.geoSim.active=false;
      state.geoSim.geo={lat:latitude,lng:longitude};
      state.geoSim.customerId=best?best.c.id:state.geoSim.customerId;
      state.geoSim.checked=true;
      state.geoSim.result=best;
      renderClockInModalBody();
    },
    err=>{ state.geoSim.active=true; state.geoSim.checked=false; renderClockInModalBody(); },
    {timeout:5000}
  );
}
function renderClockInModalBody(){
  const el=document.getElementById('clockinModalBody');
  if(el) el.innerHTML = clockInModalContent();
}
function clockInModalContent(){
  const gs=state.geoSim;
  const cust = getCust(gs.customerId);
  let statusBox='';
  if(!gs.active && gs.result){
    const okDist = gs.result.d <= (cust?.radius||100);
    statusBox = okDist
      ? `<div class="ok-box">${ic('check')} GPS erkannt: Sie befinden sich ca. <b>${Math.round(gs.result.d)} m</b> von „${cust.name}“ entfernt – innerhalb des Radius (${cust.radius} m).</div>`
      : `<div class="warn-box">${ic('close')} GPS erkannt: Sie sind ca. <b>${Math.round(gs.result.d)} m</b> von „${cust.name}“ entfernt – außerhalb des Radius (${cust.radius} m).</div>`;
  } else if(gs.active){
    const okDist = gs.distance <= (cust?.radius||100);
    statusBox = `<div class="sim-box">${ic('bolt')} Kein GPS verfügbar – <b>Simulationsmodus</b>. Entfernung manuell einstellen, um Geofencing zu testen.
      <div style="margin-top:10px;"><input type="range" class="slider" min="0" max="400" value="${gs.distance}" oninput="state.geoSim.distance=+this.value; renderClockInModalBody();"><div class="hint mono">${gs.distance} m vom Standort entfernt ${okDist?'(innerhalb Radius ✓)':'(außerhalb Radius ✗)'}</div></div>
    </div>`;
  }
  return `
    <div class="field">
      <label>Standort / Kunde</label>
      <select onchange="state.geoSim.customerId=this.value; renderClockInModalBody();">
        ${gs.pool.map(c=>`<option value="${c.id}" ${c.id===gs.customerId?'selected':''}>${c.name}</option>`).join('')}
      </select>
    </div>
    <div id="geoResultBox">${statusBox}</div>
    <div class="hint" style="margin-top:10px;">Geofence-Radius für diesen Standort: <b>${cust?cust.radius:'–'} m</b></div>
  `;
}
function confirmClockIn(){
  const emp=getEmp(actingEmployeeId());
  const gs=state.geoSim;
  const cust=getCust(gs.customerId);
  const dist = gs.active? gs.distance : (gs.result? gs.result.d : 0);
  const ok = dist <= (cust?.radius||100);
  const now=new Date().toISOString();
  state.timeEntries.push({id:uid(),employeeId:emp.id,customerId:cust.id,clockIn:now,clockOut:null,geofenceOk:ok,distance:dist,
    pauseMinutes:0,pauseStart:null,status:'offen',notes:'',createdAt:now,updatedAt:now,changeLog:[]});
  scheduleSave();
  closeModal();
  toast(ok? 'Erfolgreich eingestempelt.' : 'Eingestempelt – außerhalb des Geofence-Radius vermerkt.');
}
function handleClockOut(){
  const emp=getEmp(actingEmployeeId());
  const open=openEntryFor(emp.id);
  if(!open) return;
  if(open.pauseStart){ endPause(); }
  open.clockOut=new Date().toISOString();
  // Nach dem Ausstempeln erhält der Eintrag automatisch den Status "Offen" (zur Prüfung durch Admin/Manager)
  open.status='offen';
  open.updatedAt=new Date().toISOString();
  scheduleSave();
  render();
  toast('Erfolgreich ausgestempelt.');
}

function filteredShifts(){
  const f=state.filter;
  return state.shifts.filter(s=>
    (!f.schedStandort || f.schedStandort==='alle' || s.customerId===f.schedStandort) &&
    (!f.schedEmp || f.schedEmp==='alle' || s.employeeId===f.schedEmp)
  );
}
function weekInputValue(offset){
  const d=weekRange(offset);
  // ISO week number
  const t=new Date(d); t.setHours(0,0,0,0); t.setDate(t.getDate()+3-((t.getDay()+6)%7));
  const week1=new Date(t.getFullYear(),0,4);
  const weekNo=1+Math.round(((t-week1)/86400000-3+((week1.getDay()+6)%7))/7);
  return t.getFullYear()+'-W'+pad(weekNo);
}
function onWeekPick(val){
  if(!val) return;
  const [y,w]=val.split('-W').map(Number);
  const jan4=new Date(y,0,4);
  const mon1=addDays(jan4,-((jan4.getDay()+6)%7));
  const target=addDays(mon1,(w-1)*7);
  const diffWeeks=Math.round((mondayOf(target)-mondayOf(new Date()))/(7*86400000));
  state.weekOffset=diffWeeks;
  render();
}
function scheduleFilterBar(){
  const f=state.filter;
  return `

        <button class="icon-btn" onclick="state.weekOffset++;render();">${ic('chevR')}</button>
      </div>
      <input type="week" class="sched-week-input" value="${weekInputValue(state.weekOffset)}" onchange="onWeekPick(this.value)">
      ${state.weekOffset!==0?`<button class="btn btn-outline btn-sm" onclick="state.weekOffset=0;render();">Heute</button>`:''}

function viewSchedule(){
  const start=weekRange(state.weekOffset);
  const days=[...Array(7)].map((_,i)=>addDays(start,i));
  const shifts=filteredShifts();
  const conflictIds=computeConflictIds();
  const todayIso=isoDate(new Date());

  const desktop=`<div class="sched-desktop">
    <div class="cal-grid7">
      ${days.map(d=>{
        const iso=isoDate(d);
        const dayShifts=shifts.filter(s=>s.date===iso).sort((a,b)=>a.start.localeCompare(b.start));
        const isToday=iso===todayIso;
        return `<div class="cal-col ${isToday?'is-today':''}">
          <div class="cal-col-head"><span>${WEEKDAYS[(d.getDay()+6)%7]}</span><span class="d">${d.getDate()}.${d.getMonth()+1}.</span>${isToday?'<span class="today-dot"></span>':''}</div>
          <div class="cal-col-body">
            ${dayShifts.length? dayShifts.map(s=>shiftCard(s,conflictIds)).join('') : `<div class="cal-empty-hint">Keine Schichten geplant</div>`}
          </div>
          <button class="cal-add-day" onclick="openShiftModal(null,null,'${iso}')" ${hasPerm('schedule_create')?'':'style="visibility:hidden;"'}>${ic('plus')} Schicht</button>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  const mobDay = days.find(d=>isoDate(d)===state.mobileDay) ? state.mobileDay : (days.some(d=>isoDate(d)===todayIso)? todayIso : isoDate(days[0]));
  const orderedDays = [...days].sort((a,b)=> (isoDate(a)===todayIso?-1:0) - (isoDate(b)===todayIso?-1:0));
  const mobile=`<div class="sched-mobile">
    <div class="day-tabs">
      ${orderedDays.map(d=>{const iso=isoDate(d);const isToday=iso===todayIso;return `<button class="day-tab ${iso===mobDay?'active':''}" onclick="state.mobileDay='${iso}';render();">${isToday?'Heute':WEEKDAYS[(d.getDay()+6)%7]}<span>${d.getDate()}.${d.getMonth()+1}.</span></button>`;}).join('')}
    </div>
    <div class="mob-day-list">
      ${(()=>{const dayShifts=shifts.filter(s=>s.date===mobDay).sort((a,b)=>a.start.localeCompare(b.start));
        return dayShifts.length? dayShifts.map(s=>shiftCard(s,conflictIds)).join('') : `<div class="cal-empty-hint" style="padding:26px 0;text-align:center;">Keine Schichten für diesen Tag geplant</div>`;})()}
    </div>
    ${hasPerm('schedule_create')?`<button class="fab" onclick="openShiftModal(null,null,'${mobDay}')">${ic('plus')}</button>`:''}
  </div>`;

  return scheduleFilterBar() + desktop + mobile + (state.panelShiftId? renderShiftPanel(): '');
}

      <th>Mitarbeiter</th><th>Rolle</th>${canDetails?'<th>Kontakt</th><th>Standorte</th><th>PIN</th>':''}<th>Status</th>${(canEdit||canDeactivate||isAdmin())?'<th></th>':''}
    </tr></thead><tbody>
    ${list.map(e=>`<tr>
      <td><div class="person"><div class="avatar" style="background:${colorFor(e.id)}">${initials(e.name)}</div><div><div class="name">${e.name}</div><div class="meta">seit ${fmtDate(new Date(e.startDate))} ${roleChip(e.systemRole)}</div></div></div></td>
      <td>${e.role}</td>
      ${canDetails?`<td><div style="font-size:12.5px;">${e.email}</div><div class="meta">${e.phone}</div></td>
      <td>${e.customerIds.length? e.customerIds.map(cid=>{const c=getCust(cid);return c?`<span class="badge badge-green" style="margin:1px;">${c.name}</span>`:'';}).join(''):'<span class="hint">keine</span>'}</td>
      <td class="mono">${e.pin}</td>`:''}
      <td>${e.status==='aktiv'?'<span class="badge badge-mint"><span class="badge-dot"></span>Aktiv</span>':'<span class="badge badge-grey"><span class="badge-dot"></span>Inaktiv</span>'}</td>
      ${(canEdit||canDeactivate||isAdmin())?`<td><div style="display:flex;gap:6px;">
        ${canEdit?`<button class="icon-btn" onclick="openEmployeeModal('${e.id}')">${ic('edit')}</button>`:''}
        ${isAdmin()?`<button class="icon-btn" onclick="deleteEmployee('${e.id}')">${ic('trash')}</button>`:(canDeactivate?`<button class="icon-btn" onclick="toggleEmployeeStatus('${e.id}')" title="${e.status==='aktiv'?'Deaktivieren':'Aktivieren'}">${ic(e.status==='aktiv'?'close':'check')}</button>`:'')}
      </div></td>`:''}
    </tr>`).join('') || `<tr><td colspan="7"><div class="empty">${ic('employees')}<p>Keine Mitarbeiter gefunden.</p></div></td></tr>`}
    </tbody></table></div>
  </div>`;
}
function roleChip(r){
  if(!r || r==='mitarbeiter') return '';
  return ` · <span style="color:var(--primary-dark);font-weight:700;">${roleLabel(r)}</span>`;
}
function toggleEmployeeStatus(id){
  const e=getEmp(id); if(!e) return;
  e.status = e.status==='aktiv'?'inaktiv':'aktiv';
  scheduleSave(); render();
  toast(e.status==='aktiv'? 'Mitarbeiter aktiviert.':'Mitarbeiter deaktiviert.');
}
function openEmployeeModal(id){
  state.editing = id? {...state.employees.find(e=>e.id===id), customerIds:[...state.employees.find(e=>e.id===id).customerIds]}
    : {id:null,name:'',role:'Servicefachkraft',email:'',phone:'',status:'aktiv',pin:String(Math.floor(1000+Math.random()*8999)),startDate:isoDate(new Date()),customerIds:[]};
  state.modal='employee';
  render();
}
function toggleEditingCustomer(cid){
  const arr=state.editing.customerIds;
  const i=arr.indexOf(cid);
  if(i>=0) arr.splice(i,1); else arr.push(cid);
  render();
}
function saveEmployee(){
  const f=id=>document.getElementById(id).value;
  const data={name:f('ef-name'),role:f('ef-role'),email:f('ef-email'),phone:f('ef-phone'),status:f('ef-status'),pin:f('ef-pin'),startDate:f('ef-start'),customerIds:[...state.editing.customerIds]};
  if(isAdmin() && document.getElementById('ef-systemrole')){
    data.systemRole = f('ef-systemrole');
  }
  if(!data.name.trim()){ toast('Bitte einen Namen angeben.'); return; }
  if(state.editing.id){
    Object.assign(state.employees.find(e=>e.id===state.editing.id), data);
    toast('Mitarbeiter aktualisiert.');
  }else{
    const emp={id:uid(),systemRole:'mitarbeiter',...data};
    state.employees.push(emp);
    if(!state.currentEmployeeId) state.currentEmployeeId=emp.id;
    toast('Mitarbeiter angelegt und verknüpft.');
  }
  scheduleSave();
  closeModal();
}
function deleteEmployee(id){
  if(!confirm('Diesen Mitarbeiter wirklich löschen?')) return;
  state.employees=state.employees.filter(e=>e.id!==id);
  scheduleSave();
  render();
  toast('Mitarbeiter gelöscht.');
}

/* ============ ABWESENHEITEN ============ */
function viewAbsence(){
  const filter = state.filter.absStatus||'alle';
  const canAll = hasPerm('absence_view_all');
  let list = state.absences.filter(a=>filter==='alle'||a.status===filter);
  if(!canAll) list = list.filter(a=>a.employeeId===state.currentUserId);
  list = list.sort((a,b)=>b.start.localeCompare(a.start));
  return `
  <div class="toolbar">
    <div class="tabs">
      ${['alle','beantragt','genehmigt','abgelehnt'].map(s=>`<button class="tab ${filter===s?'active':''}" onclick="state.filter.absStatus='${s}';render();">${s==='alle'?'Alle':(s==='beantragt'?'Ausstehend':s[0].toUpperCase()+s.slice(1))}</button>`).join('')}
    </div>
    ${hasPerm('absence_request')?`<button class="btn btn-primary" onclick="openAbsenceModal()">${ic('plus')} Antrag erfassen</button>`:''}
  </div>
  ${!canAll?`<div class="hint" style="margin-bottom:10px;">Du siehst nur deine eigenen Anträge.</div>`:''}
  <div class="card">
    <div class="table-wrap"><table><thead><tr>
      <th>Mitarbeiter</th><th>Art</th><th>Zeitraum</th><th>Tage</th><th>Notiz</th><th>Status</th><th></th>
    </tr></thead><tbody>
    ${list.map(a=>{
      const e=getEmp(a.employeeId);
      const days=Math.round((new Date(a.end)-new Date(a.start))/86400000)+1;
      return `<tr>
      <td><div class="person"><div class="avatar" style="background:${colorFor(e.id)}">${initials(e.name)}</div><span>${e.name}</span></div></td>
      <td>${absTypeBadge(a.type)}</td>
      <td class="mono">${fmtDate(new Date(a.start))} – ${fmtDate(new Date(a.end))}</td>
      <td>${days}</td>
      <td style="max-width:180px;color:var(--ink-soft);font-size:12.3px;">${a.note||'—'}</td>
      <td>${statusBadge(a.status)}</td>
      <td><div style="display:flex;gap:6px;">
        ${a.status==='beantragt' && hasPerm('absence_approve')?`<button class="icon-btn" title="Genehmigen" onclick="setAbsStatus('${a.id}','genehmigt')">${ic('check')}</button>`:''}
        ${a.status==='beantragt' && hasPerm('absence_reject')?`<button class="icon-btn" title="Ablehnen" onclick="setAbsStatus('${a.id}','abgelehnt')">${ic('close')}</button>`:''}
        ${isAdmin()?`<button class="icon-btn" onclick="deleteAbsence('${a.id}')">${ic('trash')}</button>`:''}
      </div></td>
    </tr>`;}).join('') || `<tr><td colspan="7"><div class="empty">${ic('absence')}<p>Keine Einträge in dieser Ansicht.</p></div></td></tr>`}
    </tbody></table></div>
  </div>`;
}
function absTypeBadge(type){
  const map={'Urlaub':'badge-green','Krankheit':'badge-red','Unbezahlt':'badge-amber','Sonstiges':'badge-grey'};
  return `<span class="badge ${map[type]||'badge-grey'}">${type}</span>`;
}
function openAbsenceModal(){
  state.editing={employeeId:state.employees[0]?.id,type:'Urlaub',start:isoDate(new Date()),end:isoDate(new Date()),note:''};
  state.modal='absence';
  render();
}
function saveAbsence(){
  const f=id=>document.getElementById(id).value;
  const data={employeeId:f('af-emp'),type:f('af-type'),start:f('af-start'),end:f('af-end'),note:f('af-note'),status:'beantragt'};
  state.absences.push({id:uid(),...data});
  scheduleSave();
  closeModal();
  toast('Antrag erfasst.');
}
function setAbsStatus(id,status){
  const a=state.absences.find(x=>x.id===id); if(a) a.status=status;
  scheduleSave(); render();
  toast(status==='genehmigt'?'Antrag genehmigt.':'Antrag abgelehnt.');
}
function deleteAbsence(id){
  state.absences=state.absences.filter(a=>a.id!==id);
  scheduleSave(); render();
}

/* ============ STANDORTE / KUNDEN ============ */
function viewLocations(){
  const canManage = hasPerm('locations_manage');
  return `
  <div class="toolbar">
    <div class="sub" style="color:var(--ink-soft);font-size:12.5px;">${state.customers.length} Standorte hinterlegt</div>
    ${canManage?`<button class="btn btn-primary" onclick="openCustomerModal(null)">${ic('plus')} Standort / Kunde anlegen</button>`:''}
  </div>
  <div class="grid cols-3">
    ${state.customers.map(c=>{
      const empCount = state.employees.filter(e=>e.customerIds.includes(c.id)).length;
      const openIssues = (c.issues||[]).filter(i=>i.status!=='erledigt').length;
      return `<div class="cust-card" onclick="openLocationPanel('${c.id}')">
        <div class="top">
          <div>
            <h4>${c.name}</h4>
            <div class="addr">${c.address}</div>
          </div>
          ${canManage?`<div style="display:flex;gap:6px;" onclick="event.stopPropagation();">
            <button class="icon-btn" onclick="openCustomerModal('${c.id}')">${ic('edit')}</button>
            <button class="icon-btn" onclick="deleteCustomer('${c.id}')">${ic('trash')}</button>
          </div>`:''}
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;">
          <span class="badge badge-grey">${c.type||'—'}</span>
          <span class="badge badge-green">${c.interval||'—'}</span>
          ${openIssues? `<span class="badge badge-red"><span class="badge-dot"></span>${openIssues} offene Mängel</span>`:''}
        </div>
        <div class="radius-tag">${ic('location')} Radius ${c.radius} m</div>
        <div class="divider"></div>
        <div style="font-size:12.3px;color:var(--ink-soft);">Ansprechperson: <b style="color:var(--ink)">${c.contact||'—'}</b></div>
        <div style="font-size:12.3px;color:var(--ink-soft);">${c.phone||''}</div>
        <div style="margin-top:9px;font-size:12px;color:var(--ink-faint);">${empCount} Mitarbeiter · ${c.area||'–'} m² · ${(c.tasks||[]).length} Leistungspunkte</div>
      </div>`;
    }).join('')}
  </div>
  ${state.panelLocationId? renderLocationPanel(): ''}`;
}

/* ---- Standort-Detailpanel: Leistungsverzeichnis & Mängel ---- */
function openLocationPanel(id){ state.panelLocationId=id; render(); }
function closeLocationPanel(){ state.panelLocationId=null; render(); }
function renderLocationPanelBody(){
  const el=document.getElementById('locPanelBody');
  if(el) el.innerHTML = locationPanelBodyHtml(state.customers.find(c=>c.id===state.panelLocationId));
}
function toggleTask(cid,tid){
  const c=state.customers.find(x=>x.id===cid); const t=c.tasks.find(x=>x.id===tid);
  if(t){ t.done=!t.done; scheduleSave(); renderLocationPanelBody(); }
}
function removeTask(cid,tid){
  const c=state.customers.find(x=>x.id===cid);
  c.tasks=c.tasks.filter(x=>x.id!==tid);
  scheduleSave(); renderLocationPanelBody();
}
function addTask(cid){
  const input=document.getElementById('newTaskInput');
  const label=input.value.trim();
  if(!label) return;
  const c=state.customers.find(x=>x.id===cid);
  c.tasks.push({id:uid(),label,done:false});
  scheduleSave();
  renderLocationPanelBody();
}
function addIssue(cid){
  const text=document.getElementById('newIssueInput').value.trim();
  const severity=document.getElementById('newIssueSeverity').value;
  if(!text) return;
  const c=state.customers.find(x=>x.id===cid);
  c.issues=c.issues||[];
  c.issues.push({id:uid(),date:isoDate(new Date()),text,status:'offen',severity});
  scheduleSave();
  renderLocationPanelBody();
  toast('Mängelmeldung erfasst.');
}
function setIssueStatus(cid,iid,status){
  const c=state.customers.find(x=>x.id===cid);
  const i=c.issues.find(x=>x.id===iid);
  if(i){ i.status=status; scheduleSave(); renderLocationPanelBody(); }
}
function removeIssue(cid,iid){
  const c=state.customers.find(x=>x.id===cid);
  c.issues=c.issues.filter(x=>x.id!==iid);
  scheduleSave(); renderLocationPanelBody();
}
function issueBadge(status){
  const map={offen:['badge-red','Offen'],'in Bearbeitung':['badge-amber','In Bearbeitung'],erledigt:['badge-mint','Erledigt']};
  const [cls,label]=map[status]||['badge-grey',status];
  return `<span class="badge ${cls}"><span class="badge-dot"></span>${label}</span>`;
}
function severityDot(sev){
  const map={niedrig:'var(--ink-faint)',mittel:'var(--amber)',hoch:'var(--red)'};
  return `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${map[sev]||'var(--ink-faint)'};margin-right:5px;"></span>`;
}
function locationPanelBodyHtml(c){
  if(!c) return '';
  const empCount = state.employees.filter(e=>e.customerIds.includes(c.id));
  const tasks=c.tasks||[], issues=(c.issues||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const doneCount=tasks.filter(t=>t.done).length;
  return `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
      <span class="badge badge-grey">${c.type||'—'}</span>
      <span class="badge badge-green">${c.interval||'—'}</span>
      <span class="badge badge-mint">${c.area||'–'} m²</span>
    </div>
    ${c.lat&&c.lng? `<iframe loading="lazy" style="width:100%;height:150px;border:1px solid var(--line);border-radius:10px;margin-bottom:14px;" src="https://www.openstreetmap.org/export/embed.html?bbox=${c.lng-0.004}%2C${c.lat-0.0025}%2C${c.lng+0.004}%2C${c.lat+0.0025}&layer=mapnik&marker=${c.lat}%2C${c.lng}"></iframe>`:''}
    <div class="detail-grid" style="margin-bottom:16px;">
      <div style="grid-column:1/-1;"><span class="dl">Adresse</span><span class="dv">${c.address}</span></div>
      <div><span class="dl">Geofence-Radius</span><span class="dv">${c.radius} m</span></div>
      <div><span class="dl">Mitarbeiter zugeordnet</span><span class="dv">${empCount.length}</span></div>
      <div><span class="dl">Ansprechperson</span><span class="dv">${c.contact||'—'}</span></div>
      <div><span class="dl">Telefon</span><span class="dv">${c.phone||'—'}</span></div>
      <div><span class="dl">Vertragsbeginn</span><span class="dv">${c.contractStart?fmtDate(new Date(c.contractStart)):'—'}</span></div>
      <div><span class="dl">Stundenkontingent</span><span class="dv">${c.monthlyHours||0} h / Monat</span></div>
      <div><span class="dl">Stundensatz</span><span class="dv">CHF ${(c.hourlyRate||0).toFixed(2)}</span></div>
    </div>
    <div class="settings-section" style="margin-bottom:16px;">
      <h3 style="font-size:13px;">Zugang & Schlüssel</h3>
      <div class="detail-grid" style="margin-top:8px;">
        <div><span class="dl">Schlüsselnummer</span><span class="dv mono">${c.keyNumber||'—'}</span></div>
        <div><span class="dl">Zugangscode</span><span class="dv mono">${c.accessCode||'—'}</span></div>
        <div><span class="dl">Zugangszeitfenster</span><span class="dv">${c.accessFrom&&c.accessTo? c.accessFrom+' – '+c.accessTo+' Uhr':'—'}</span></div>
        <div style="grid-column:1/-1;"><span class="dl">Hinweis</span><span class="dv" style="font-weight:500;">${c.accessNotes||'—'}</span></div>
      </div>
    </div>
    <div class="settings-section" style="margin-bottom:16px;">
      <div class="card-head" style="margin-bottom:8px;"><h3 style="font-size:13px;">Leistungsverzeichnis</h3><span class="hint">${doneCount}/${tasks.length} erledigt</span></div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px;">
        ${tasks.length? tasks.map(t=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--surface-alt);border-radius:8px;">
          <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${c.id}','${t.id}')" style="accent-color:var(--primary);">
          <span style="flex:1;font-size:12.8px;${t.done?'text-decoration:line-through;color:var(--ink-faint);':''}">${t.label}</span>
          <button class="icon-btn" style="width:24px;height:24px;" onclick="removeTask('${c.id}','${t.id}')">${ic('close')}</button>
        </div>`).join('') : `<div class="hint">Noch keine Aufgaben hinterlegt.</div>`}
      </div>
      <div style="display:flex;gap:6px;">
        <input id="newTaskInput" placeholder="Neue Aufgabe, z. B. Teppiche saugen" style="flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:8px;" onkeydown="if(event.key==='Enter'){addTask('${c.id}');}">
        <button class="btn btn-outline btn-sm" onclick="addTask('${c.id}')">${ic('plus')} Hinzufügen</button>
      </div>
    </div>
    <div class="settings-section">
      <div class="card-head" style="margin-bottom:8px;"><h3 style="font-size:13px;">Mängel & Reklamationen</h3><span class="hint">${issues.filter(i=>i.status!=='erledigt').length} offen</span></div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px;">
        ${issues.length? issues.map(i=>`<div style="border:1px solid var(--line);border-radius:9px;padding:8px 10px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
            <div style="font-size:12.6px;">${severityDot(i.severity)}${i.text}</div>
            <button class="icon-btn" style="width:24px;height:24px;flex:none;" onclick="removeIssue('${c.id}','${i.id}')">${ic('close')}</button>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
            <span class="hint">${fmtDate(new Date(i.date))}</span>
            <div style="display:flex;gap:5px;align-items:center;">
              ${issueBadge(i.status)}
              ${i.status!=='erledigt'? `<button class="link-btn" onclick="setIssueStatus('${c.id}','${i.id}','${i.status==='offen'?'in Bearbeitung':'erledigt'}')">${i.status==='offen'?'→ In Bearbeitung':'→ Erledigt'}</button>`:''}
            </div>
          </div>
        </div>`).join('') : `<div class="hint">Keine Mängel erfasst.</div>`}
      </div>
      <div style="display:flex;gap:6px;">
        <input id="newIssueInput" placeholder="Neue Mängelmeldung…" style="flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:8px;">
        <select id="newIssueSeverity" style="padding:8px 8px;border:1px solid var(--line);border-radius:8px;">
          <option value="niedrig">Niedrig</option>
          <option value="mittel" selected>Mittel</option>
          <option value="hoch">Hoch</option>
        </select>
        <button class="btn btn-outline btn-sm" onclick="addIssue('${c.id}')">${ic('plus')}</button>
      </div>
    </div>
  `;
}
function renderLocationPanel(){
  const c=state.customers.find(x=>x.id===state.panelLocationId);
  if(!c) return '';
  return `<div class="drawer-overlay" onclick="if(event.target===this) closeLocationPanel();">
    <div class="drawer">
      <div class="drawer-head">
        <h3>${c.name}</h3>
        <button class="close-x" onclick="closeLocationPanel()">${ic('close')}</button>
      </div>
      <div class="drawer-body" id="locPanelBody">${locationPanelBodyHtml(c)}</div>
      <div class="drawer-foot">
        ${hasPerm('locations_manage')?`<button class="btn btn-danger" onclick="deleteCustomer('${c.id}')">${ic('trash')} Löschen</button><button class="btn btn-primary" onclick="openCustomerModal('${c.id}')">${ic('edit')} Bearbeiten</button>`:`<span class="hint">Nur Ansicht – keine Bearbeitungsrechte.</span>`}
      </div>
    </div>
  </div>`;
}
function openCustomerModal(id){
  state.editing = id? {...state.customers.find(c=>c.id===id)}
    : {id:null,name:'',address:'',lat:47.3769,lng:8.5417,radius:state.settings.defaultRadius||100,contact:'',phone:'',active:true,notes:'',
       type:'Büro',area:100,interval:'wöchentlich',keyNumber:'',accessCode:'',accessFrom:'',accessTo:'',accessNotes:'',
       contractStart:isoDate(new Date()),monthlyHours:10,hourlyRate:38,
       tasks:['Böden reinigen / wischen','Staub wischen','Sanitäranlagen reinigen','Mülleimer leeren'].map(t=>({id:uid(),label:t,done:false})),issues:[]};
  state.addrQuery = state.editing.address || '';
  state.addrResults = [];
  state.modal='customer';
  render();
}
function onAddressInput(val){
  state.addrQuery = val;
  state.editing.address = val;
  state.addrResults = searchAddresses(val);
  renderAddrSection();
}
function pickAddress(idx){
  const r=state.addrResults[idx];
  if(!r) return;
  state.editing.address = r.label;
  state.editing.lat = r.lat;
  state.editing.lng = r.lng;
  state.addrQuery = r.label;
  state.addrResults = [];
  renderAddrSection();
}
function onManualCoord(field,val){
  state.editing[field] = parseFloat(val)||0;
  renderAddrSection();
}
function renderAddrSection(){
  const el=document.getElementById('addrSection');
  if(el) el.innerHTML = addrSectionHtml();
}
function addrSectionHtml(){
  const e=state.editing;
  const hasCoords = e.lat && e.lng;
  return `
    <div class="field" style="position:relative;">
      <label>Adresse suchen</label>
      <input id="cf-address-search" autocomplete="off" placeholder="Strasse, PLZ oder Ort eingeben…" value="${state.addrQuery||''}" oninput="onAddressInput(this.value)">
      ${state.addrResults.length? `<div class="addr-suggest">
        ${state.addrResults.map((r,i)=>`<div class="addr-suggest-item" onclick="pickAddress(${i})">${ic('location')}<span>${r.label}</span></div>`).join('')}
      </div>`:''}
      <div class="hint">Adressauswahl basiert auf einer lokalen Demo-Datenbank (kein Google-API-Key im Prototyp hinterlegt) – Ergebnis füllt Adresse und Koordinaten automatisch aus.</div>
    </div>
    <input type="hidden" id="cf-address" value="${e.address||''}">
    ${hasCoords? `<iframe loading="lazy" style="width:100%;height:150px;border:1px solid var(--line);border-radius:10px;margin:4px 0 12px;" src="https://www.openstreetmap.org/export/embed.html?bbox=${e.lng-0.004}%2C${e.lat-0.0025}%2C${e.lng+0.004}%2C${e.lat+0.0025}&layer=mapnik&marker=${e.lat}%2C${e.lng}"></iframe>`:''}
    <div class="field-row">
      <div class="field"><label>Breitengrad (Lat)</label><input id="cf-lat" type="number" step="0.0001" value="${e.lat}" onchange="onManualCoord('lat',this.value)"></div>

/* ============ BERICHTE ============ */
function viewReports(){
  const canExport=hasPerm('reports_export');
  const canDetail=hasPerm('reports_time_view');
  const period = state.filter.reportPeriod || 'week';
  const rangeStart = period==='week'? mondayOf(new Date()) : new Date(new Date().getFullYear(), new Date().getMonth(),1);
  const rangeEnd = period==='week'? addDays(rangeStart,7) : new Date(new Date().getFullYear(), new Date().getMonth()+1,1);
  const rows = state.employees.filter(e=>e.status==='aktiv').map(e=>{
    const entries = state.timeEntries.filter(t=>t.employeeId===e.id && t.clockOut && new Date(t.clockIn)>=rangeStart && new Date(t.clockIn)<rangeEnd);
    const totalMin = entries.reduce((s,t)=>s+((new Date(t.clockOut)-new Date(t.clockIn))/60000 - (t.pauseMinutes||0)),0);
    const shifts = state.shifts.filter(s=>s.employeeId===e.id && new Date(s.date)>=rangeStart && new Date(s.date)<rangeEnd).length;
    return {e, hours: totalMin/60, entries: entries.length, shifts};
  }).sort((a,b)=>b.hours-a.hours);
  const totalHours = rows.reduce((s,r)=>s+r.hours,0);
  return `
  <div class="toolbar">
    <div class="tabs">
      <button class="tab ${period==='week'?'active':''}" onclick="state.filter.reportPeriod='week';render();">Diese Woche</button>
      <button class="tab ${period==='month'?'active':''}" onclick="state.filter.reportPeriod='month';render();">Dieser Monat</button>
    </div>
    ${canExport?`<button class="btn btn-outline" onclick="exportReport('${period}')">${ic('check')} Als CSV exportieren</button>`:''}
  </div>
  <div class="grid cols-4" style="margin-bottom:16px;">
    ${kpiCard('hourglass','Gesamtstunden',totalHours.toFixed(1)+' h','var(--amber-tint)','#93670A', period==='week'?'diese Woche':'dieser Monat')}
    ${kpiCard('users2','Aktive Mitarbeiter',rows.length,'var(--primary-tint)','var(--primary-dark)','im Zeitraum')}
    ${kpiCard('schedule','Geplante Schichten',rows.reduce((s,r)=>s+r.shifts,0),'#E3FBEF','var(--accent-dark)','im Zeitraum')}
    ${kpiCard('clock','Ø Stunden / Mitarbeiter',rows.length?(totalHours/rows.length).toFixed(1)+' h':'0 h','var(--red-tint)','var(--red)','Durchschnitt')}
  </div>
  ${canDetail? `<div class="card">
    <div class="card-head"><h3>Arbeitszeiten nach Mitarbeiter</h3></div>
    <div class="table-wrap"><table><thead><tr><th>Mitarbeiter</th><th>Rolle</th><th>Einträge</th><th>Schichten</th><th>Stunden</th></tr></thead><tbody>
      ${rows.map(r=>`<tr><td><div class="person"><div class="avatar" style="background:${colorFor(r.e.id)}">${initials(r.e.name)}</div><span>${r.e.name}</span></div></td>
        <td>${r.e.role}</td>
        <td>${r.entries}</td><td>${r.shifts}</td><td class="mono">${r.hours.toFixed(1)} h</td></tr>`).join('') || `<tr><td colspan="5"><div class="empty">${ic('briefcase')}<p>Keine Daten im gewählten Zeitraum.</p></div></td></tr>`}
    </tbody></table></div>
  </div>` : `<div class="empty">${ic('briefcase')}<p>Detaillierte Arbeitszeitberichte sind für deine Rolle nicht freigegeben.</p></div>`}`;
}
function exportReport(period){
  const rangeStart = period==='week'? mondayOf(new Date()) : new Date(new Date().getFullYear(), new Date().getMonth(),1);
  const rangeEnd = period==='week'? addDays(rangeStart,7) : new Date(new Date().getFullYear(), new Date().getMonth()+1,1);
  const rows = state.employees.map(e=>{
    const entries = state.timeEntries.filter(t=>t.employeeId===e.id && t.clockOut && new Date(t.clockIn)>=rangeStart && new Date(t.clockIn)<rangeEnd);
    const totalMin = entries.reduce((s,t)=>s+((new Date(t.clockOut)-new Date(t.clockIn))/60000 - (t.pauseMinutes||0)),0);
    return [e.name, e.role, entries.length, (totalMin/60).toFixed(2)];
  });
  const csv = ['Mitarbeiter;Rolle;Einträge;Stunden', ...rows.map(r=>r.join(';'))].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='arbeitszeitbericht-'+period+'.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('Bericht exportiert.');
}

function myShifts(){ return state.shifts.filter(s=>s.employeeId===state.currentUserId); }
function myOpenEntry(){ return openEntryFor(state.currentUserId); }
function weekBounds(){ const s=mondayOf(new Date()); return [s, addDays(s,7)]; }
function myWeekMinutes(){
  const [ws,we]=weekBounds();
  return state.timeEntries.filter(t=>t.employeeId===state.currentUserId && t.clockOut && new Date(t.clockIn)>=ws && new Date(t.clockIn)<we)
    .reduce((s,t)=>s+((new Date(t.clockOut)-new Date(t.clockIn))/60000-(t.pauseMinutes||0)),0);
}
function myTodayMinutes(){
  const todayIso=isoDate(new Date());
  return state.timeEntries.filter(t=>t.employeeId===state.currentUserId && isoDate(new Date(t.clockIn))===todayIso)
    .reduce((s,t)=>{ const end=t.clockOut? new Date(t.clockOut): new Date(); return s+((end-new Date(t.clockIn))/60000-(t.pauseMinutes||0)); },0);
}

    </div>

        <div>Status<b>${onPause?'In Pause':(isOn?'Im Einsatz':'Nicht eingestempelt')}</b></div>

function startPause(){
  const open=openEntryFor(actingEmployeeId()); if(!open) return;
  open.pauseStart=new Date().toISOString();
  open.updatedAt=open.pauseStart;
  scheduleSave(); render();
  toast('Pause gestartet.');
}
function endPause(){
  const open=openEntryFor(actingEmployeeId()); if(!open||!open.pauseStart) return;
  const mins=Math.round((new Date()-new Date(open.pauseStart))/60000);
  open.pauseMinutes=(open.pauseMinutes||0)+mins;
  open.pauseStart=null;
  open.updatedAt=new Date().toISOString();
  scheduleSave(); render();
  toast('Pause beendet ('+mins+' Min.).');
}
